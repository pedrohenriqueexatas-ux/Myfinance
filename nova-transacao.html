    <!-- CONTEÚDO PRINCIPAL -->
    <main class="conteudo-principal">
      <section id="nova-transacao" class="secao secao-ativa">
        <div class="container">
          <h1 class="secao-titulo" id="titulo-formulario">Nova Transação</h1>
          <p class="secao-subtitulo">Registre uma nova receita ou despesa</p>

          <div class="formulario-container">
            <form id="form-transacao" class="formulario">
              <div class="campo-grupo">
                <label for="campo-tipo" class="campo-label">Tipo</label>
                <select id="campo-tipo" class="campo-input" required>
                  <option value="despesa">Despesa</option>
                  <option value="receita">Receita</option>
                </select>
              </div>

              <div class="campo-grupo">
                <label for="campo-descricao" class="campo-label">Descrição</label>
                <input type="text" id="campo-descricao" class="campo-input" placeholder="Ex: Conta de luz, Salário..." required maxlength="100" />
              </div>

              <div class="campo-grupo">
                <label for="campo-valor" class="campo-label">Valor (R$)</label>
                <input type="number" id="campo-valor" class="campo-input" placeholder="0,00" min="0.01" step="0.01" required />
              </div>

              <div class="campo-grupo">
                <label for="campo-categoria" class="campo-label">Categoria</label>
                <select id="campo-categoria" class="campo-input" required>
                  <option value="">Selecione uma categoria</option>
                  <option value="Alimentação">Alimentação</option>
                  <option value="Transporte">Transporte</option>
                  <option value="Moradia">Moradia</option>
                  <option value="Saúde">Saúde</option>
                  <option value="Educação">Educação</option>
                  <option value="Lazer">Lazer</option>
                  <option value="Roupas">Roupas</option>
                  <option value="Contas">Contas</option>
                  <option value="Outros">Outros</option>
                </select>
              </div>

              <div class="campo-grupo">
                <label for="campo-data" class="campo-label">Data</label>
                <input type="date" id="campo-data" class="campo-input" required />
              </div>

              <div class="formulario-botoes">
                <button type="submit" id="btn-salvar" class="btn btn-primario">
                  Adicionar
                </button>
                <button type="button" id="btn-cancelar" class="btn btn-secundario" style="display: none;">
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
