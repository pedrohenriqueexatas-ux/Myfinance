      <div class="navbar-container">
        <a href="index.html" class="navbar-logo">
          <span class="logo-icone">💰</span>
          <span class="logo-texto">MyFinance</span>
        </a>
        <button class="botao-menu" id="botao-menu" aria-label="Menu">
          <span class="hamburger-linha"></span>
          <span class="hamburger-linha"></span>
          <span class="hamburger-linha"></span>
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="index.html" class="nav-link">📊 Dashboard</a></li>
          <li><a href="nova-transacao.html" class="nav-link">➕ Nova Transação</a></li>
          <li><a href="historico.html" class="nav-link">📋 Histórico</a></li>

          <li><a href="sobre.html" class="nav-link">ℹ️ Sobre</a></li>
        </ul>
      </div>
    </nav>

    <main class="conteudo-principal">
      <section id="contato" class="secao secao-ativa">
        <div class="container">
          <h1 class="secao-titulo">Fale Conosco</h1>
          <p class="secao-subtitulo">Envie suas dúvidas, sugestões ou feedback</p>

          <div class="formulario-container">
            <form id="form-contato" class="formulario" onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso! (Isto é apenas uma simulação)'); this.reset();">
              <div class="campo-grupo">
                <label for="campo-nome" class="campo-label">Nome Completo</label>
                <input type="text" id="campo-nome" class="campo-input" placeholder="Seu nome..." required />
              </div>

              <div class="campo-grupo">
                <label for="campo-email" class="campo-label">E-mail</label>
                <input type="email" id="campo-email" class="campo-input" placeholder="seuemail@exemplo.com" required />
              </div>
              
              <div class="campo-grupo">
                <label for="campo-assunto" class="campo-label">Assunto</label>
                <select id="campo-assunto" class="campo-input" required>
                  <option value="">Selecione um assunto</option>
                  <option value="duvida">Dúvida</option>
                  <option value="sugestao">Sugestão de Funcionalidade</option>
                  <option value="bug">Relatar um Erro</option>
                  <option value="outro">Outro</option>
                </select>
              </div>

              <div class="campo-grupo">
                <label for="campo-mensagem" class="campo-label">Mensagem</label>
                <textarea id="campo-mensagem" class="campo-input" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
              </div>

              <div class="formulario-botoes" style="margin-top: 15px;">
                <button type="submit" class="btn btn-primario btn-grande" style="width: 100%;">
                  Enviar Mensagem 🚀
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="footer-texto">💰 MyFinance &copy; 2026 — Projeto Acadêmico</p>
      </div>
    </footer>

    <script type="module" src="./src/pages/contato.ts"></script>
  </body>
</html>
